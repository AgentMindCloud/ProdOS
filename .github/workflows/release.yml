name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    name: Full validation
    uses: ./.github/workflows/ci.yml

  build-windows:
    name: Build Windows package
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ProducerOS (editable, dev extras)
        run: python -m pip install --upgrade pip; pip install -e ".[dev]"

      - name: Ensure Inno Setup is available
        shell: pwsh
        run: |
          $found = Get-Command iscc.exe -ErrorAction SilentlyContinue
          if (-not $found) {
            $candidates = @(
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
            )
            $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $found) {
            Write-Host "Inno Setup not preinstalled on this runner image -- installing via Chocolatey."
            choco install innosetup --no-progress -y
          } else {
            Write-Host "Inno Setup already available: $found"
          }

      - name: Build the installer (PyInstaller + Inno Setup)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          .\scripts\build_installer.ps1 -Version $version
          echo "PRODUCEROS_VERSION=$version" >> $env:GITHUB_ENV

      - name: Generate SBOM (CycloneDX)
        run: pip install cyclonedx-bom && cyclonedx-py environment -o sbom.json

      - name: Package and checksum
        shell: pwsh
        run: |
          $version = $env:PRODUCEROS_VERSION
          Copy-Item "installer-output\ProducerOS-Setup-$version.exe" "ProducerOS-Setup-$version.exe"
          $installerHash = Get-FileHash -Path "ProducerOS-Setup-$version.exe" -Algorithm SHA256
          "$($installerHash.Hash)  ProducerOS-Setup-$version.exe" | Out-File -Encoding ascii "ProducerOS-Setup-$version.exe.sha256"

          $zipName = "ProducerOS-$version-windows-portable.zip"
          Compress-Archive -Path dist\ProducerOS\* -DestinationPath $zipName
          $zipHash = Get-FileHash -Path $zipName -Algorithm SHA256
          "$($zipHash.Hash)  $zipName" | Out-File -Encoding ascii "$zipName.sha256"

          echo "INSTALLER_NAME=ProducerOS-Setup-$version.exe" >> $env:GITHUB_ENV
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            ${{ env.INSTALLER_NAME }}
            ${{ env.INSTALLER_NAME }}.sha256
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256
            sbom.json
          retention-days: 90

  publish:
    name: Publish GitHub release
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets

      - name: Create release notes
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cat > release-notes.md <<EOF
          ## ProducerOS ${{ github.ref_name }}

          ### Install (recommended)
          1. Download **\`ProducerOS-Setup-${VERSION}.exe\`** below.
          2. Double-click it. No admin rights needed, no other software
             required.
          3. Keep "Create a desktop icon" checked (it's on by default) and
             click through the wizard.
          4. Use the ProducerOS icon on your desktop (or Start Menu) to
             open the app from now on.

          ### Updating from an older version
          Just download the new \`ProducerOS-Setup-${VERSION}.exe\` and run
          it the same way -- it upgrades your existing install in place.
          Your projects, releases, and settings are stored separately and
          are never touched by installing, updating, or uninstalling.

          ### Portable option
          \`ProducerOS-${VERSION}-windows-portable.zip\` is a no-installer
          alternative: extract it anywhere and run \`ProducerOS.exe\`
          directly (keep it together with its \`_internal\\\` folder). No
          Start Menu entry or desktop icon is created this way.

          ### Verify
          Each download has a matching \`.sha256\` checksum file. The
          attached \`sbom.json\` (CycloneDX) lists every bundled dependency
          in this build.

          See \`docs/INSTALL_WINDOWS.md\` for the full walkthrough and
          \`docs/BACKUP_RESTORE.md\` before updating an existing install.
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ProducerOS ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release-assets/*
