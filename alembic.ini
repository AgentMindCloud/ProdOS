[alembic]
script_location = migrations
prepend_sys_path = src
version_path_separator = os

# sqlalchemy.url is intentionally omitted here -- migrations/env.py resolves
# the database URL from produceros.config.get_settings() at runtime, so this
# same alembic.ini works for every user's data directory without editing.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
